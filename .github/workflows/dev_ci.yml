name: FE CI - DEV

on:
  push:
    branches:
      - dev
    paths-ignore:
      - "docs/**"
      - "**.md"

jobs:
  test:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-24.04-arm
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Upload Docker Compose file to S3
        run: |
          aws s3 cp docker/dev/docker-compose.yml s3://${{ secrets.AWS_S3_BUCKET_NAME }}/dev/fe/docker-compose.yml

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          registry-type: public
          mask-password: true
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/prod/dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/a3y4e2t5/ktb-community/dev/fe-registry:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/a3y4e2t5/ktb-community/dev/fe-registry:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
