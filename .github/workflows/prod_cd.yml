name: FE CD - PROD

on:
  workflow_run:
    workflows: ["FE CI - PROD"]
    types:
      - completed
    paths-ignore:
      - "docs/**"
      - "**.md"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # - name: Install Session Manager Plugin
      #   run: |
      #     curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
      #     sudo dpkg -i session-manager-plugin.deb

      - name: Upload Docker Compose file to S3
        # ECR_REGISTRY_IMAGE 변수를 실제 이미지 URI로 치환
        # 현재는 GitHub Secrets에 저장된 값을 사용하지만 AWS SSM Parameter Store 등을 활용할 수도 있음
        run: |

          sed -i "s|\\$AWS_ECR_REGISTRY_IMAGE|${{ secrets.AWS_ECR_REGISTRY_IMAGE }}|" docker-compose.yml

          aws s3 cp docker-compose.yml s3://${{ secrets.AWS_S3_BUCKET_NAME }}/fe/docker-compose.yml

      - name: Deploy to EC2 with Docker
        run: |
          aws ssm send-command \
            --region ap-northeast-2 \
            --instance-ids ${{ secrets.AWS_EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Executed by Github Actions" \
            --parameters '{
              "commands": [
                "aws s3 cp s3://${{ secrets.AWS_S3_BUCKET_NAME }}/fe/docker-compose.yml /home/ec2-user/docker-compose.yml",
                "sudo su - ec2-user -c \"cd /home/ec2-user && docker compose pull && docker compose up -d && docker image prune -f\""
              ]
            }'
