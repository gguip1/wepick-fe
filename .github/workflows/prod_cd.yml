name: FE CD - PROD

on:
  workflow_run:
    workflows: ["FE CI - PROD"]
    types: [completed]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod-frontend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        (
          github.event.workflow_run.event == 'push' ||
          github.event.workflow_run.event == 'workflow_dispatch'
        )
      }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEPLOY }}
          aws-region: ap-northeast-2

      - name: Update frontend image tag
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          aws ssm put-parameter \
            --name /wepick/fe_image_tag \
            --value "$IMAGE_TAG" \
            --type String \
            --overwrite

      - name: Get instance ID
        id: instance
        run: |
          IID=$(aws ssm get-parameter --name /wepick/instance_id --query "Parameter.Value" --output text)
          echo "id=$IID" >> "$GITHUB_OUTPUT"

      - name: SSM SendCommand deploy frontend
        id: ssm
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.instance.outputs.id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy frontend ${{ github.event.workflow_run.head_sha }} via GitHub Actions" \
            --parameters commands='["BUCKET=$(aws ssm get-parameter --name /wepick/artifacts_bucket --query Parameter.Value --output text --region ap-northeast-2)","aws s3 cp s3://$BUCKET/prod/scripts/deploy-on-ec2.sh /tmp/deploy-on-ec2.sh --region ap-northeast-2","chmod +x /tmp/deploy-on-ec2.sh","bash /tmp/deploy-on-ec2.sh frontend"]' \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.id }}"

      - name: Show SSM output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.id }}" \
            --query "{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}" \
            --output json
