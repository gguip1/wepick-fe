name: FE CD - PROD

on:
  workflow_run:
    workflows: ["FE CI - PROD"]
    types: [completed]

jobs:
  trigger-infra-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger wepick-infra deploy.yml
        env:
          GH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          gh api repos/gguip1/wepick-infra/dispatches \
            -f event_type='deploy-fe' \
            -f client_payload[image_tag]="$IMAGE_TAG" \
            -f client_payload[source_repo]="${{ github.repository }}" \
            -f client_payload[source_sha]="$IMAGE_TAG"
