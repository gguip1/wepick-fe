<!-- Global Header Component -->
<header class="global-header" id="globalHeader">
  <div class="header-container">
    <!-- Logo -->
    <a href="/" class="header-logo">
      <img
        src="/assets/imgs/wepick-logo-64.png"
        alt="Wepick Logo"
        class="header-logo-image"
      />
      <span class="header-logo-text">Wepick</span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="header-nav">
      <a href="/today" class="header-nav-link">오늘의 선택</a>
      <a href="/topics" class="header-nav-link">이전 토픽</a>
      <a href="/community" class="header-nav-link">커뮤니티</a>
    </nav>

    <!-- User Menu -->
    <div class="header-user-menu">
      <!-- Not Logged In -->
      <div class="header-auth-links" id="headerAuthLinks">
        <a href="/users/signin" class="header-auth-link">로그인</a>
        <a href="/users/signup" class="header-auth-link header-signup">
          회원가입
        </a>
      </div>

      <!-- Logged In -->
      <div class="header-user-dropdown" id="headerUserDropdown" hidden>
        <button class="header-user-button" id="headerUserButton">
          <span id="headerUserName">사용자</span>
          <span class="header-dropdown-arrow">▼</span>
        </button>
        <div class="header-dropdown-menu" id="headerDropdownMenu" hidden>
          <a href="/users/edit" class="header-dropdown-item">프로필 수정</a>
          <a href="/users/edit-password" class="header-dropdown-item">
            비밀번호 변경
          </a>
          <button class="header-dropdown-item" id="headerLogoutButton">
            로그아웃
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="header-mobile-toggle" id="headerMobileToggle">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div class="header-mobile-menu" id="headerMobileMenu" hidden>
    <nav class="header-mobile-nav">
      <a href="/today" class="header-mobile-link">오늘의 선택</a>
      <a href="/topics" class="header-mobile-link">이전 토픽</a>
      <a href="/community" class="header-mobile-link">커뮤니티</a>
    </nav>

    <div class="header-mobile-auth">
      <!-- Not Logged In -->
      <div class="header-mobile-auth-links" id="headerMobileAuthLinks">
        <a href="/users/signin" class="header-mobile-auth-link">로그인</a>
        <a href="/users/signup" class="header-mobile-auth-link">회원가입</a>
      </div>

      <!-- Logged In -->
      <div class="header-mobile-user" id="headerMobileUser" hidden>
        <span class="header-mobile-username" id="headerMobileUserName">
          사용자
        </span>
        <a href="/users/edit" class="header-mobile-link">프로필 수정</a>
        <a href="/users/edit-password" class="header-mobile-link">
          비밀번호 변경
        </a>
        <button class="header-mobile-link" id="headerMobileLogoutButton">
          로그아웃
        </button>
      </div>
    </div>
  </div>
</header>
