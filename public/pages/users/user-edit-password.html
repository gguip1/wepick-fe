<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 변경 - WePick</title>

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/custom.css" />
    <link rel="stylesheet" href="/css/pages/auth.css" />
  </head>
  <body data-page="users-edit-password">
    <div class="auth-wrapper">
      <div class="auth-container">
        <!-- Logo Section with Back Button -->
        <div class="auth-logo">
          <a href="/users/edit" class="auth-back-btn">
            <img src="/assets/imgs/back_button.svg" alt="뒤로가기" />
          </a>
          <a href="/today" class="auth-logo-link">
            <img src="/assets/imgs/wepick-logo.png" alt="WePick Logo" />
            <span class="auth-logo-text">WePick</span>
          </a>
        </div>

        <!-- Auth Header -->
        <div class="auth-header">
          <h1 class="auth-title">비밀번호 변경</h1>
          <p class="auth-subtitle">새로운 비밀번호를 입력하세요</p>
        </div>

        <!-- Password Change Form -->
        <form id="password-change-form" class="auth-form">
          <!-- Current Password -->
          <div class="form-group">
            <label for="currentPassword" class="form-label">
              현재 비밀번호 <span class="required">*</span>
            </label>
            <input
              type="password"
              id="currentPassword"
              name="currentPassword"
              class="form-input"
              placeholder="현재 비밀번호를 입력하세요"
              required
              autocomplete="current-password"
              data-validate="required"
            />
            <div class="invalid-feedback"></div>
          </div>

          <!-- New Password -->
          <div class="form-group">
            <label for="newPassword" class="form-label">
              새 비밀번호 <span class="required">*</span>
            </label>
            <input
              type="password"
              id="newPassword"
              name="newPassword"
              class="form-input"
              placeholder="새 비밀번호를 입력하세요"
              required
              autocomplete="new-password"
              data-validate="password"
            />
            <div class="invalid-feedback"></div>
          </div>

          <!-- New Password Confirmation -->
          <div class="form-group">
            <label for="newPassword2" class="form-label">
              비밀번호 확인 <span class="required">*</span>
            </label>
            <input
              type="password"
              id="newPassword2"
              name="newPassword2"
              class="form-input"
              placeholder="새 비밀번호를 한번 더 입력하세요"
              required
              autocomplete="new-password"
              data-validate="required"
            />
            <div class="invalid-feedback"></div>
          </div>

          <!-- Message Area -->
          <div id="form-message" class="form-message"></div>

          <!-- Buttons -->
          <div class="form-navigation">
            <button type="button" id="cancel-btn" class="btn btn-secondary btn-full">
              취소
            </button>
            <button type="submit" class="btn btn-primary btn-full">
              비밀번호 변경
            </button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="/js/pages/users/editPassword.js"></script>
  </body>
</html>
