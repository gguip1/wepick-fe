<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>개인정보 수정 - WePick</title>

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/custom.css" />
    <link rel="stylesheet" href="/css/pages/auth.css" />
    <link rel="stylesheet" href="/css/pages/user-edit.css" />
  </head>
  <body data-page="users-edit">
    <div class="auth-wrapper">
      <div class="auth-container edit-container">
        <!-- Logo Section with Back Button -->
        <div class="auth-logo">
          <a href="/today" class="auth-back-btn">
            <img src="/assets/imgs/back_button.svg" alt="뒤로가기" />
          </a>
          <a href="/today" class="auth-logo-link">
            <img src="/assets/imgs/wepick-logo.png" alt="WePick Logo" />
            <span class="auth-logo-text">WePick</span>
          </a>
        </div>

        <!-- Auth Header -->
        <div class="auth-header">
          <h1 class="auth-title">개인정보 수정</h1>
          <p class="auth-subtitle">프로필과 계정 정보를 관리하세요</p>
        </div>

        <!-- Edit Options Cards -->
        <div class="edit-options">
          <!-- Profile Image Card -->
          <div class="edit-card" data-link="/users/edit/profile-img">
            <div class="edit-card-icon">
              <i class="bi bi-image"></i>
            </div>
            <div class="edit-card-content">
              <h3 class="edit-card-title">프로필 사진</h3>
              <p class="edit-card-description">
                프로필 사진을 변경할 수 있습니다
              </p>
            </div>
            <div class="edit-card-arrow">
              <i class="bi bi-chevron-right"></i>
            </div>
          </div>

          <!-- Nickname Card -->
          <div class="edit-card" data-link="/users/edit/nickname">
            <div class="edit-card-icon">
              <i class="bi bi-person-badge"></i>
            </div>
            <div class="edit-card-content">
              <h3 class="edit-card-title">닉네임 변경</h3>
              <p class="edit-card-description">
                닉네임을 변경할 수 있습니다
              </p>
            </div>
            <div class="edit-card-arrow">
              <i class="bi bi-chevron-right"></i>
            </div>
          </div>

          <!-- Password Change Card -->
          <div class="edit-card" data-link="/users/edit/password">
            <div class="edit-card-icon">
              <i class="bi bi-shield-lock"></i>
            </div>
            <div class="edit-card-content">
              <h3 class="edit-card-title">비밀번호 변경</h3>
              <p class="edit-card-description">
                계정 보안을 위해 비밀번호를 변경할 수 있습니다
              </p>
            </div>
            <div class="edit-card-arrow">
              <i class="bi bi-chevron-right"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/js/pages/users/edit.js"></script>
  </body>
</html>
