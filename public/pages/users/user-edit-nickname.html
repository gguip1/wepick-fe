<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>닉네임 변경 - WePick</title>

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/custom.css" />
    <link rel="stylesheet" href="/css/pages/auth.css" />
  </head>
  <body data-page="users-edit-nickname">
    <div class="auth-wrapper">
      <div class="auth-container">
        <!-- Logo Section with Back Button -->
        <div class="auth-logo">
          <a href="/users/edit" class="auth-back-btn">
            <img src="/assets/imgs/back_button.svg" alt="뒤로가기" />
          </a>
          <a href="/today" class="auth-logo-link">
            <img src="/assets/imgs/wepick-logo-64.png" alt="WePick Logo" />
            <span class="auth-logo-text">WePick</span>
          </a>
        </div>

        <!-- Auth Header -->
        <div class="auth-header">
          <h1 class="auth-title">닉네임 변경</h1>
          <p class="auth-subtitle">새로운 닉네임을 입력하세요</p>
        </div>

        <!-- Nickname Form -->
        <form id="nickname-change-form" class="auth-form">
          <!-- Current Nickname (Read-only) -->
          <div class="form-group">
            <label for="currentNickname" class="form-label">
              현재 닉네임
            </label>
            <input
              type="text"
              id="currentNickname"
              name="currentNickname"
              class="form-input"
              readonly
              disabled
            />
          </div>

          <!-- New Nickname -->
          <div class="form-group">
            <label for="nickname" class="form-label">
              새 닉네임 <span class="required">*</span>
            </label>
            <input
              type="text"
              id="nickname"
              name="nickname"
              class="form-input"
              placeholder="새 닉네임을 입력하세요"
              required
              autocomplete="nickname"
              data-validate="nickname"
            />
            <div class="invalid-feedback"></div>
          </div>

          <!-- Message Area -->
          <div id="form-message" class="form-message"></div>

          <!-- Buttons -->
          <div class="form-navigation">
            <button type="button" id="cancel-btn" class="btn btn-secondary btn-full">
              취소
            </button>
            <button type="submit" class="btn btn-primary btn-full">
              변경하기
            </button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="/js/pages/users/editNickname.js"></script>
  </body>
</html>
