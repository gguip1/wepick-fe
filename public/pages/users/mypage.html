<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마이페이지 - WePick</title>
    <link rel="icon" type="image/png" href="/assets/imgs/wepick-logo-64.png" />
    <link rel="stylesheet" href="/css/custom.css" />
    <link rel="stylesheet" href="/css/components/header.css" />
    <link rel="stylesheet" href="/css/components/footer.css" />
    <link rel="stylesheet" href="/css/pages/users/mypage.css" />
  </head>
  <body data-page="mypage">
    <!-- Global Header -->
    <div id="headerContainer"></div>

    <!-- Main Content -->
    <main class="mypage-container">
      <div class="mypage-content">
        <!-- Page Title -->
        <div class="mypage-header">
          <h1 class="mypage-title">마이페이지</h1>
        </div>

        <!-- Loading Skeleton -->
        <div id="loadingSkeleton" class="loading-skeleton">
          <div class="skeleton-profile-card">
            <div class="skeleton-avatar"></div>
            <div class="skeleton-info">
              <div class="skeleton-line skeleton-nickname"></div>
              <div class="skeleton-line skeleton-email"></div>
            </div>
          </div>
          <div class="skeleton-section">
            <div class="skeleton-line skeleton-title"></div>
            <div class="skeleton-menu-item"></div>
          </div>
        </div>

        <!-- Actual Content (hidden initially) -->
        <div id="actualContent" hidden>
          <!-- User Profile Card -->
          <div class="user-profile-card">
            <div class="profile-image-section">
              <img
                id="userProfileImage"
                src="/assets/imgs/profile_icon.svg"
                alt="프로필 이미지"
                class="profile-image"
              />
            </div>
            <div class="profile-info-section">
              <h2 id="userNickname" class="profile-nickname"></h2>
              <p id="userEmail" class="profile-email"></p>
            </div>
          </div>

          <!-- Menu List -->
          <div class="menu-section">
            <h2 class="section-title">개인정보 설정</h2>
            <div class="menu-list">
              <a href="/users/edit/profile-img" class="menu-item">
                <div class="menu-item-content">
                  <svg class="menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M20.5899 22C20.5899 18.13 16.7399 15 11.9999 15C7.25991 15 3.40991 18.13 3.40991 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <span class="menu-label">프로필 이미지 변경</span>
                </div>
                <span class="menu-arrow">›</span>
              </a>
              <a href="/users/edit/nickname" class="menu-item">
                <div class="menu-item-content">
                  <svg class="menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 11C14.2091 11 16 9.20914 16 7C16 4.79086 14.2091 3 12 3C9.79086 3 8 4.79086 8 7C8 9.20914 9.79086 11 12 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <span class="menu-label">닉네임 변경</span>
                </div>
                <span class="menu-arrow">›</span>
              </a>
              <a href="/users/edit/password" class="menu-item">
                <div class="menu-item-content">
                  <svg class="menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 11H5C3.89543 11 3 11.8954 3 13V20C3 21.1046 3.89543 22 5 22H19C20.1046 22 21 21.1046 21 20V13C21 11.8954 20.1046 11 19 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M7 11V7C7 5.67392 7.52678 4.40215 8.46447 3.46447C9.40215 2.52678 10.6739 2 12 2C13.3261 2 14.5979 2.52678 15.5355 3.46447C16.4732 4.40215 17 5.67392 17 7V11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <span class="menu-label">비밀번호 재설정</span>
                </div>
                <span class="menu-arrow">›</span>
              </a>
            </div>
          </div>

          <!-- Policy Menu -->
          <div class="menu-section">
            <h2 class="section-title">약관 및 정책</h2>
            <div class="menu-list">
              <a href="/policy/terms" class="menu-item">
                <div class="menu-item-content">
                  <svg class="menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14 2H6C5.46957 2 4.96086 2.21071 4.58579 2.58579C4.21071 2.96086 4 3.46957 4 4V20C4 20.5304 4.21071 21.0391 4.58579 21.4142C4.96086 21.7893 5.46957 22 6 22H18C18.5304 22 19.0391 21.7893 19.4142 21.4142C19.7893 21.0391 20 20.5304 20 20V8L14 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M14 2V8H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M16 13H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M16 17H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M10 9H9H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <span class="menu-label">이용약관</span>
                </div>
                <span class="menu-arrow">›</span>
              </a>
              <a href="/policy/privacy" class="menu-item">
                <div class="menu-item-content">
                  <svg class="menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 18 12 22 12 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <span class="menu-label">개인정보처리방침</span>
                </div>
                <span class="menu-arrow">›</span>
              </a>
            </div>
          </div>

          <!-- Account Management -->
          <div class="menu-section">
            <h2 class="section-title">계정 관리</h2>
            <div class="menu-list danger">
              <button id="deleteAccountBtn" class="menu-item delete-item">
                <div class="menu-item-content">
                  <svg class="menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 7L18.1327 19.1425C18.0579 20.1891 17.187 21 16.1378 21H7.86224C6.81296 21 5.94208 20.1891 5.86732 19.1425L5 7M10 11V17M14 11V17M15 7V4C15 3.44772 14.5523 3 14 3H10C9.44772 3 9 3.44772 9 4V7M4 7H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <span class="menu-label">회원탈퇴</span>
                </div>
                <span class="menu-arrow">›</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Global Footer -->
    <footer></footer>

    <!-- Scripts -->
    <script type="module" src="/js/pages/users/mypage.js"></script>
  </body>
</html>
