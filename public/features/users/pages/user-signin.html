<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 - WePick</title>
    <link rel="icon" type="image/png" href="/assets/imgs/wepick-logo-64.png" />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/shared/styles/custom.css" />
    <link rel="stylesheet" href="/shared/styles/header.css" />
    <link rel="stylesheet" href="/features/users/styles/auth.css" />
  </head>
  <body data-page="users-signin">
    <div class="auth-wrapper">
      <!-- Back Button (outside card) -->
      <button class="auth-back-btn-floating" id="auth-back-btn">
        <img src="/assets/imgs/back_button.svg" alt="뒤로가기" />
      </button>

      <div class="auth-container">
        <!-- Auth Header -->
        <div class="auth-header">
          <h1 class="auth-title">로그인</h1>
          <p class="auth-subtitle">계정에 로그인하여 계속하세요</p>
        </div>

        <!-- Auth Form -->
        <form id="sign-in-form" class="auth-form">
          <!-- Email Input -->
          <div class="form-group">
            <label for="email" class="form-label">
              이메일 <span class="required">*</span>
            </label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="name@example.com"
              required
              autocomplete="email"
              data-validate="email"
            />
            <div class="invalid-feedback"></div>
          </div>

          <!-- Password Input -->
          <div class="form-group">
            <label for="password" class="form-label">
              비밀번호 <span class="required">*</span>
            </label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="••••••••"
              required
              autocomplete="current-password"
              data-validate="required"
            />
            <div class="invalid-feedback"></div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary btn-full">
            로그인
          </button>

          <!-- 메시지 영역 (에러/성공) -->
          <div id="form-message" class="form-message"></div>
        </form>

        <!-- Auth Footer -->
        <div class="auth-footer">
          <p class="auth-footer-text">
            계정이 없으신가요?
            <a href="/users/signup" class="auth-footer-link">회원가입</a>
          </p>
        </div>
      </div>
    </div>

    <script type="module" src="/features/users/scripts/signin.js"></script>
  </body>
</html>
