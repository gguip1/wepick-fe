<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - 페이지를 찾을 수 없습니다</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="196x196" href="/assets/imgs/wepick-logo-196.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="/assets/imgs/wepick-logo-128.png" />
    <link rel="icon" type="image/png" href="/assets/imgs/wepick-logo.png" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/shared/styles/footer.css" />
    <link rel="stylesheet" href="/features/error/styles/error.css" />
  </head>
  <body data-page="error-404">
    <div class="error-container">
      <!-- Logo -->
      <a href="/today" class="error-logo">
        <img
          src="/assets/imgs/wepick-logo-64.png"
          alt="WePick Logo"
          class="error-logo-image"
        />
        <span class="error-logo-text">WePick</span>
      </a>

      <!-- Error Card -->
      <div class="error-card">
        <!-- 404 Illustration -->
        <div class="error-illustration">
          <svg
            viewBox="0 0 200 200"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            class="error-svg"
          >
            <!-- Sad face with dark theme -->
            <circle
              cx="100"
              cy="100"
              r="80"
              fill="rgba(59, 130, 246, 0.1)"
              stroke="rgba(59, 130, 246, 0.5)"
              stroke-width="3"
            />
            <circle cx="75" cy="85" r="8" fill="rgba(96, 165, 250, 0.8)" />
            <circle cx="125" cy="85" r="8" fill="rgba(96, 165, 250, 0.8)" />
            <!-- Sad mouth -->
            <path
              d="M70 130 Q100 150 130 130"
              stroke="rgba(96, 165, 250, 0.8)"
              stroke-width="3"
              stroke-linecap="round"
              fill="none"
            />
            <!-- Confused eyebrows -->
            <path
              d="M60 60 L80 50 M140 60 L120 50"
              stroke="rgba(96, 165, 250, 0.8)"
              stroke-width="3"
              stroke-linecap="round"
            />
          </svg>
        </div>

        <!-- Error Code -->
        <h1 class="error-code">404</h1>

        <!-- Error Title -->
        <h2 class="error-title">페이지를 찾을 수 없습니다</h2>

        <!-- Error Description -->
        <p class="error-description">
          요청하신 페이지가 존재하지 않거나 이동되었을 수 있습니다.
        </p>

        <!-- Navigation Buttons -->
        <div class="error-buttons">
          <button id="backBtn" class="btn btn-secondary">
            이전으로
          </button>
          <a href="/today" class="btn btn-primary">
            홈으로
          </a>
        </div>
      </div>

      <!-- Additional Help Text -->
      <p class="error-help">
        문제가 계속되면 <a href="/today" class="error-link">홈페이지</a>로 돌아가 주세요.
      </p>
    </div>

    <!-- Global Footer (will be loaded dynamically) -->
    <footer></footer>

    <!-- JavaScript -->
    <script type="module">
      // Load footer
      async function loadFooter() {
        const footerContainer = document.querySelector('footer');
        if (!footerContainer) return;

        try {
          const response = await fetch('/shared/components/footer.html');
          const html = await response.text();
          footerContainer.innerHTML = html;
        } catch (error) {
          console.error('Failed to load footer:', error);
        }
      }

      // Smart back button navigation
      const backBtn = document.getElementById('backBtn');

      if (backBtn) {
        backBtn.addEventListener('click', () => {
          // Check if there's history to go back to
          if (window.history.length > 1) {
            window.history.back();
          } else {
            // No history, go to home
            window.location.href = '/today';
          }
        });
      }

      // Initialize
      loadFooter();
    </script>
  </body>
</html>
