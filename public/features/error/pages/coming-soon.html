<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>개발 중 - WePick</title>
    <link rel="icon" type="image/png" href="/assets/imgs/wepick-logo-64.png" />
    <link rel="stylesheet" href="/shared/styles/custom.css" />
    <link rel="stylesheet" href="/shared/styles/header.css" />
    <link rel="stylesheet" href="/features/error/styles/coming-soon.css" />
  </head>
  <body data-page="coming-soon">
    <div class="coming-soon-container">
      <div class="coming-soon-content">
        <!-- Icon -->
        <div class="construction-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <!-- Title -->
        <h1 class="coming-soon-title">🚧 개발 중입니다</h1>

        <!-- Description -->
        <p class="coming-soon-description">
          현재 이 기능은 열심히 개발 중입니다.<br />
          곧 만나보실 수 있도록 최선을 다하고 있습니다.
        </p>

        <!-- Features List -->
        <div class="features-list">
          <div class="feature-item">
            <svg class="feature-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 11.08V12C21.9988 14.1564 21.3005 16.2547 20.0093 17.9818C18.7182 19.7088 16.9033 20.9725 14.8354 21.5839C12.7674 22.1953 10.5573 22.1219 8.53447 21.3746C6.51168 20.6273 4.78465 19.2461 3.61096 17.4371C2.43727 15.628 1.87979 13.4881 2.02168 11.3363C2.16356 9.18455 2.99721 7.13631 4.39828 5.49706C5.79935 3.85781 7.69279 2.71537 9.79619 2.24013C11.8996 1.76489 14.1003 1.98232 16.07 2.86" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M22 4L12 14.01L9 11.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="feature-text">새로운 기능 개발</span>
          </div>
          <div class="feature-item">
            <svg class="feature-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 6V12L16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="feature-text">안정적인 서비스 준비</span>
          </div>
          <div class="feature-item">
            <svg class="feature-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 14C8 14 9.5 16 12 16C14.5 16 16 14 16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9 9H9.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M15 9H15.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="feature-text">최고의 사용자 경험</span>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
          <a href="/" class="btn-primary">홈으로 가기</a>
          <button onclick="history.back()" class="btn-secondary">이전 페이지</button>
        </div>

        <!-- Progress Info -->
        <div class="progress-info">
          <p class="progress-text">개발 진행 상황을 확인하고 싶으신가요?</p>
          <a href="/community/posts" class="progress-link">커뮤니티에서 소식 받아보기 →</a>
        </div>
      </div>
    </div>
  </body>
</html>
