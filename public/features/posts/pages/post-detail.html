<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시물 상세 - WePick</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/imgs/wepick-logo-50.png" />

    <!-- Styles -->
    <link rel="stylesheet" href="/shared/styles/header.css" />
    <link rel="stylesheet" href="/shared/styles/footer.css" />
    <link rel="stylesheet" href="/features/posts/styles/detail.css" />
  </head>
  <body data-page="posts-detail" data-active-nav="community">
    <!-- Global Header (will be loaded dynamically) -->
    <header></header>

    <!-- Main Content -->
    <main class="detail-page">
      <div class="detail-container">
        <!-- Post Detail Section -->
        <section id="post-detail-section" class="post-detail-section">
          <!-- Skeleton Loading -->
          <div class="skeleton-loader">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton-meta-bar">
              <div class="skeleton skeleton-avatar"></div>
              <div class="skeleton skeleton-meta"></div>
            </div>
            <div class="skeleton skeleton-image"></div>
            <div class="skeleton-content">
              <div class="skeleton skeleton-text"></div>
              <div class="skeleton skeleton-text"></div>
              <div class="skeleton skeleton-text"></div>
              <div class="skeleton skeleton-text" style="width: 85%"></div>
            </div>
            <div class="skeleton skeleton-button"></div>
          </div>
        </section>

        <!-- Comments Section -->
        <section id="comments-section" class="comments-section">
          <h3 class="comments-header">
            댓글 <span id="comment-count" class="comment-count-badge">0</span>
          </h3>

          <!-- Comment Form -->
          <form id="comment-form" class="comment-form">
            <textarea
              class="comment-textarea"
              id="comment-content"
              name="content"
              rows="3"
              maxlength="300"
              placeholder="댓글을 남겨주세요! (최대 300자)"
              required
            ></textarea>
            <div class="comment-form-footer">
              <small class="char-counter">
                <span id="char-count">0</span> / 300자
              </small>
              <button type="submit" class="comment-submit-btn">
                댓글 등록
              </button>
            </div>
          </form>

          <!-- Load More Comments Button -->
          <div id="load-more-container" class="load-more-container" hidden>
            <button id="load-more-btn" class="load-more-btn">
              ↑ 이전 댓글 보기
            </button>
          </div>

          <!-- Comments List -->
          <div id="comments-list" class="comments-list">
            <!-- 댓글 목록이 여기에 동적으로 추가됩니다 -->
          </div>
        </section>
      </div>
    </main>

    <!-- Global Footer (will be loaded dynamically) -->
    <footer></footer>

    <!-- Page Script -->
    <script type="module" src="/features/posts/scripts/detail.js"></script>
  </body>
</html>
