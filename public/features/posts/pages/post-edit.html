<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 수정 - Community</title>
    <link rel="icon" type="image/png" href="/assets/imgs/wepick-logo-64.png" />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/shared/styles/custom.css" />
    <link rel="stylesheet" href="/shared/styles/header.css" />
    <link rel="stylesheet" href="/shared/styles/footer.css" />
    <link rel="stylesheet" href="/features/posts/styles/edit.css" />
  </head>
  <body data-page="posts-edit" data-active-nav="community">
    <!-- Global Header -->
    <header></header>

    <!-- Main Content -->
    <main class="edit-main">
      <div class="edit-container">
        <!-- Page Title -->
        <h1 class="edit-title">게시글 수정</h1>

        <!-- Loading Skeleton -->
        <div id="loading-skeleton" class="skeleton-loader">
          <div class="skeleton-item skeleton-title"></div>
          <div class="skeleton-item skeleton-content"></div>
          <div class="skeleton-item skeleton-images"></div>
        </div>

        <!-- Post Edit Form -->
        <form id="post-edit-form" class="edit-form" style="display: none">
            <!-- Title Input -->
            <div class="form-group">
              <label for="title" class="form-label">
                제목 <span class="required">*</span>
              </label>
              <input
                type="text"
                class="form-input"
                id="title"
                name="title"
                placeholder="제목을 입력하세요"
                maxlength="26"
                required
                data-validate="title"
              />
              <div class="invalid-feedback"></div>
              <div class="char-counter">
                <span id="title-char-count" class="count">0</span>
                <span class="max"> / 26자</span>
              </div>
            </div>

            <!-- Content Textarea -->
            <div class="form-group">
              <label for="content" class="form-label">
                내용 <span class="required">*</span>
              </label>
              <textarea
                class="form-textarea"
                id="content"
                name="content"
                rows="10"
                placeholder="내용을 입력하세요"
                maxlength="5000"
                required
                data-validate="content"
              ></textarea>
              <div class="invalid-feedback"></div>
              <div class="char-counter">
                <span id="content-char-count" class="count">0</span>
                <span class="max"> / 5000자</span>
              </div>
            </div>

            <!-- Image Upload -->
            <div class="form-group">
              <label class="form-label">
                이미지 <span class="optional">(선택사항, 최대 5개)</span>
              </label>

              <!-- Hidden File Input -->
              <input
                type="file"
                class="hidden"
                id="postImages"
                name="postImages"
                accept=".webp,.jpg,.jpeg,.png"
                multiple
              />

              <!-- Custom Upload Button -->
              <div class="upload-section">
                <button
                  type="button"
                  class="btn btn-upload"
                  id="upload-btn"
                >
                  <i class="bi bi-image"></i>
                  <span>이미지 선택</span>
                </button>
                <span class="image-count" id="image-count-text">
                  0 / 5개
                </span>
              </div>

              <div class="upload-hint">
                <i class="bi bi-info-circle"></i>
                WEBP, JPG, JPEG, PNG 형식 지원
              </div>

              <!-- Image Preview Container -->
              <div id="image-preview-container" class="image-preview-container hidden">
                <div id="image-preview-list" class="image-grid"></div>
              </div>
            </div>

            <!-- 메시지 영역 (에러/성공) -->
            <div id="form-message" class="form-message"></div>

            <!-- Form Actions -->
            <div class="form-actions">
              <button type="button" class="btn btn-secondary" id="cancel-btn">
                <span>취소</span>
              </button>
              <button type="submit" class="btn btn-primary" id="submit-btn">
                <span>수정 완료</span>
              </button>
            </div>
          </form>
      </div>
    </main>

    <!-- Global Footer (will be loaded dynamically) -->
    <footer></footer>

    <!-- Page Script -->
    <script type="module" src="/features/posts/scripts/edit.js"></script>
  </body>
</html>
